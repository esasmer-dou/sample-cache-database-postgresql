name: CacheDB Consumer Build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Setup Java and GitHub Packages credentials
        uses: actions/setup-java@v5.2.0
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          server-id: cache-database-github-packages
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Build sample against published CacheDB package
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: mvn -B clean verify -Pprovider-integration
